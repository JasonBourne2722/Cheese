    <script>
      (function applyImageCutout() {
        const images = document.querySelectorAll("img[data-cutout='true']");
        images.forEach((img) => {
          if (!img.complete) {
            img.addEventListener("load", () => cutoutImage(img), { once: true });
          } else {
            cutoutImage(img);
          }
        });

        function cutoutImage(img) {
          const w = img.naturalWidth;
          const h = img.naturalHeight;
          if (!w || !h) return;

          const canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext("2d", { willReadFrequently: true });
          ctx.drawImage(img, 0, 0);

          const frame = ctx.getImageData(0, 0, w, h);
          const data = frame.data;
          const visited = new Uint8Array(w * h);
          const queue = [];

          const corners = [
            colorAt(0, 0),
            colorAt(w - 1, 0),
            colorAt(0, h - 1),
            colorAt(w - 1, h - 1),
          ];

          // Remove border-connected background similar to corner tones
          for (let x = 0; x < w; x++) {
            pushIfBackground(x, 0);
            pushIfBackground(x, h - 1);
          }
          for (let y = 1; y < h - 1; y++) {
            pushIfBackground(0, y);
            pushIfBackground(w - 1, y);
          }

          while (queue.length) {
            const [x, y] = queue.pop();
            const idx = y * w + x;
            if (visited[idx]) continue;
            visited[idx] = 1;
            alphaAt(x, y, 0);

            if (x > 0) pushIfBackground(x - 1, y);
            if (x < w - 1) pushIfBackground(x + 1, y);
            if (y > 0) pushIfBackground(x, y - 1);
            if (y < h - 1) pushIfBackground(x, y + 1);
          }

          ctx.putImageData(frame, 0, 0);
          img.src = canvas.toDataURL("image/png");

          function colorAt(x, y) {
            const i = (y * w + x) * 4;
            return [data[i], data[i + 1], data[i + 2]];
          }

          function alphaAt(x, y, a) {
            const i = (y * w + x) * 4;
            data[i + 3] = a;
          }

          function pushIfBackground(x, y) {
            const idx = y * w + x;
            if (visited[idx]) return;
            const i = idx * 4;
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            const a = data[i + 3];
            if (a === 0) return;

            // Keep it strict so we preserve dark outlines/details.
            const isNearCorner = corners.some(([cr, cg, cb]) => {
              return (
                Math.abs(r - cr) < 34 &&
                Math.abs(g - cg) < 34 &&
                Math.abs(b - cb) < 34
              );
            });
            const isCheckerLike =
              Math.abs(r - g) < 12 && Math.abs(g - b) < 12 && r > 150;
            const isVeryDarkBg = r < 26 && g < 26 && b < 26;

            if (isNearCorner || isCheckerLike || isVeryDarkBg) {
              queue.push([x, y]);
            }
          }
        }
      })();
    </script>
